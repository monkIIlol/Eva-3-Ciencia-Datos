name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compilar módulos
        run: |
          python -m compileall -f config etl model api pipeline tests

      - name: Ejecutar pruebas automatizadas
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Validar configuración de Docker Compose
        run: |
          docker compose config

  docker-build:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir imagen del pipeline
        run: |
          docker build -f docker/Dockerfile.api -t streaming-pipeline:ci .

      - name: Construir imagen de la API
        run: |
          docker build -f docker/Dockerfile.api -t streaming-api:ci .

      - name: Construir imagen del dashboard
        run: |
          docker build -f docker/Dockerfile.dashboard -t streaming-dashboard:ci .